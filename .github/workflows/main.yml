name: deploy Nodejs Application 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name:  Deploy Via SSH
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.SSH_host}}
            username: root
            key: ${{ secrets.SSH_key}}
            script: |
             cd /root/nodejs-application-demo
             git pull 
             
            